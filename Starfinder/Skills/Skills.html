<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Starfinder - Skills Terminal</title>
    <!-- Font Fantascientifici da Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #060913; 
            background-image: url('sfondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Evita barre di scorrimento per mantenere l'effetto Easter Egg pulito */
        }

        /* BARRA DI NAVIGAZIONE FISSA IN ALTO A DESTRA */
        .nav-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 9999;
        }
        .nav-pill {
            color: #00ffff !important;
            background: rgba(0, 82, 204, 0.15) !important;
            border: 1px solid #0052cc !important;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.8em;
            letter-spacing: 1px;
            transition: all 0.25s ease-in-out;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0, 82, 204, 0.2);
            backdrop-filter: blur(5px);
            cursor: pointer;
        }
        .nav-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            background-color: rgba(0, 82, 204, 0.4) !important;
            color: #ffffff !important;
            border-color: #00ffff !important;
        }

        /* INTERFACCIA RETRATTILE LATERALE SULL'ASSE DESTRA */
        .cyber-nav-container {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            z-index: 10000;
            height: 250px; 
            padding-left: 60px;
        }
        .cyber-nav-wrapper {
            display: flex;
            align-items: center;
            transform: translateX(calc(100% - 45px));
            transition: transform 0.35s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .cyber-trigger-ball {
            width: 45px;
            height: 45px;
            background: rgba(0, 82, 204, 0.15);
            border: 2px solid #0052cc;
            border-right: none;
            border-radius: 50% 0 0 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00bfff;
            font-family: 'Orbitron', monospace;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: -2px 0 15px rgba(0, 82, 204, 0.4), inset 2px 0 10px rgba(0, 191, 255, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            z-index: 2;
        }
        .cyber-menu-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(10, 15, 30, 0.95); 
            border: 2px solid #0052cc;
            border-radius: 0 0 0 12px;
            padding: 20px;
            box-shadow: -10px 0 30px rgba(0, 82, 204, 0.5);
            backdrop-filter: blur(12px); 
            z-index: 1;
            white-space: nowrap;
        }
        .cyber-nav-container:hover .cyber-nav-wrapper {
            transform: translateX(0);
        }
        .cyber-nav-container:hover .cyber-trigger-ball {
            background: rgba(0, 82, 204, 0.5);
            color: #ffffff;
            box-shadow: -5px 0 25px rgba(0, 191, 255, 0.8);
            border-radius: 12px 0 0 0;
            height: 60px;
        }
        .cyber-btn {
            color: #ffffff !important;
            text-decoration: none !important;
            padding: 10px 20px;
            border-radius: 4px; 
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 0.8em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            text-align: center;
            border-left: 3px solid transparent;
        }
        .btn-home { background: rgba(0, 82, 204, 0.3); border: 1px solid #0052cc; }
        .btn-home:hover { background: #0052cc; border-left: 3px solid #00bfff; box-shadow: 0 0 15px rgba(0, 82, 204, 0.6); transform: scale(1.02); }
        .btn-back1 { background: rgba(30, 136, 229, 0.2); border: 1px solid #1e88e5; }
        .btn-back1:hover { background: #1e88e5; border-left: 3px solid #ffffff; box-shadow: 0 0 15px rgba(30, 136, 229, 0.6); transform: scale(1.02); }
        .btn-back2 { background: rgba(2, 136, 209, 0.15); border: 1px solid #0288d1; }
        .btn-back2:hover { background: #0288d1; border-left: 3px solid #00bfff; box-shadow: 0 0 15px rgba(2, 136, 209, 0.6); transform: scale(1.02); }
    </style>
</head>
<body>

        <a href="../Classi/Classi.html" class="nav-pill">Classi</a>
        <a href="../Feats/Feats.html" class="nav-pill">Feats</a>
        <a href="../Equipaggiamento/Equipaggiamento.html" class="nav-pill">Equipaggiamenti</a>
        <a href="../Magie/Magie.html" class="nav-pill">Magie</a>
        <a href="../StarfinderSecondEdition_CharacterSheet.pdf" target="_blank" class="nav-pill" style="border-color: #00ffff !important; box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);">Scheda Personaggio</a>
    </div>

    <!-- INTERFACCIA DI NAVIGAZIONE RETRATTILE LATERALE SULL'ASSE DESTRA -->
    <div class="cyber-nav-container">
        <div class="cyber-nav-wrapper">
            <div class="cyber-trigger-ball">//</div>
            <div class="cyber-menu-panel">
                <a href="../HomeStarfinder.html" class="cyber-btn btn-home">🚀​​ Pagina iniziale</a>
                <a href="javascript:history.go(-1)" class="cyber-btn btn-back1">🔙 Indietro</a>
                <a href="javascript:history.go(-2)" class="cyber-btn btn-back2">⏮ Indietro di 2</a>
            </div>
        </div>
    </div>

</body>
</html>
