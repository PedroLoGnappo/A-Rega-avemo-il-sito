<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Starfinder - Classi</title>
    <!-- Font Fantascientifici da Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #060913; /* Nero profondo cyberpunk */
            background-image: radial-gradient(circle at 50% 30%, #0c152b 0%, #060913 70%);
            color: #e0e6ed;
            font-family: 'Rajdhani', -apple-system, sans-serif;
            font-size: 1.1em;
            margin: 0;
            padding: 40px 40px 40px 40px; /* Padding bilanciato senza immagini fisse laterali */
            letter-spacing: 0.5px;
        }

        /* BARRA DI NAVIGAZIONE FISSA IN ALTO A DESTRA (Stile Olografico) */
        .nav-container {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 9999;
        }
        .nav-pill {
            color: #00ffff !important;
            background: rgba(0, 82, 204, 0.15) !important;
            border: 1px solid #0052cc !important;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.8em;
            letter-spacing: 1px;
            transition: all 0.25s ease-in-out;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0, 82, 204, 0.2);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .nav-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            background-color: rgba(0, 82, 204, 0.4) !important;
            color: #ffffff !important;
            border-color: #00ffff !important;
        }

        /* INTESTAZIONE PRINCIPALE (EFFETTO QUANTISTICO) */
        .main-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(138, 43, 226, 0.6), 0 0 30px rgba(0, 255, 255, 0.2);
            margin-top: 60px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* STRUTTURA DELLA GRIGLIA CLASSI */
        .class-table {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto 60px auto;
            border-collapse: separate;
            border-spacing: 20px;
        }
        .class-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 25px 15px;
        }
        .class-cell {
            background: rgba(15, 22, 42, 0.6); /* Vetro scuro monolite */
            border: 1px solid #203a70;
            border-top: 4px solid #8a2be2; /* Accento viola neon superiore */
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            vertical-align: middle;
            width: 33.333%;
            text-align: center;
            backdrop-filter: blur(6px);
        }
        .class-cell:hover {
            transform: translateY(-4px);
            border-color: #00ffff;
            border-top-color: #00ffff; /* Diventa ciano luminoso al passaggio */
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.25);
            background: rgba(20, 30, 58, 0.8);
        }
        .class-img {
            width: 100%;
            max-width: 110px;
            height: auto;
            border-radius: 4px;
            border: 1px solid #203a70;
            margin-bottom: 15px;
            display: inline-block;
            transition: all 0.25s ease-in-out;
            opacity: 0.85;
        }
        .class-cell:hover .class-img {
            transform: scale(1.03);
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            opacity: 1;
        }
        .class-name {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.1em;
            letter-spacing: 2px;
            color: #ffffff;
            transition: all 0.2s ease-in-out;
        }
        .class-cell:hover .class-name {
            color: #00ffff;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
        }

        /* INTERFACCIA RETRATTILE LATERALE */
        .cyber-nav-container {
            position: fixed;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            z-index: 10000;
            height: 250px; 
            padding-left: 60px;
        }
        .cyber-nav-wrapper {
            display: flex;
            align-items: center;
            transform: translateX(calc(100% - 45px));
            transition: transform 0.35s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        .cyber-trigger-ball {
            width: 45px;
            height: 45px;
            background: rgba(0, 82, 204, 0.15);
            border: 2px solid #0052cc;
            border-right: none;
            border-radius: 50% 0 0 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00bfff;
            font-family: 'Orbitron', monospace;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: -2px 0 15px rgba(0, 82, 204, 0.4), inset 2px 0 10px rgba(0, 191, 255, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            z-index: 2;
        }
        .cyber-menu-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(10, 15, 30, 0.9); 
            border: 2px solid #0052cc;
            border-radius: 0 0 0 12px;
            padding: 20px;
            box-shadow: -10px 0 30px rgba(0, 82, 204, 0.5);
            backdrop-filter: blur(12px); 
            z-index: 1;
            white-space: nowrap;
        }
        .cyber-nav-container:hover .cyber-nav-wrapper {
            transform: translateX(0);
        }
        .cyber-nav-container:hover .cyber-trigger-ball {
            background: rgba(0, 82, 204, 0.5);
            color: #ffffff;
            box-shadow: -5px 0 25px rgba(0, 191, 255, 0.8);
            border-radius: 12px 0 0 0;
            height: 60px;
        }
        .cyber-btn {
            color: #ffffff !important;
            text-decoration: none !important;
            padding: 10px 20px;
            border-radius: 4px; 
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 0.8em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            text-align: center;
            border-left: 3px solid transparent;
        }
        .btn-home { background: rgba(0, 82, 204, 0.3); border: 1px solid #0052cc; }
        .btn-home:hover { background: #0052cc; border-left: 3px solid #00bfff; box-shadow: 0 0 15px rgba(0, 82, 204, 0.6); transform: scale(1.02); }
        .btn-back1 { background: rgba(30, 136, 229, 0.2); border: 1px solid #1e88e5; }
        .btn-back1:hover { background: #1e88e5; border-left: 3px solid #ffffff; box-shadow: 0 0 15px rgba(30, 136, 229, 0.6); transform: scale(1.02); }
        .btn-back2 { background: rgba(2, 136, 209, 0.15); border: 1px solid #0288d1; }
        .btn-back2:hover { background: #0288d1; border-left: 3px solid #00bfff; box-shadow: 0 0 15px rgba(2, 136, 209, 0.6); transform: scale(1.02); }
    </style>
</head>
